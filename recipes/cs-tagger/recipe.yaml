context:
  version: "0.3.0"
  name: cs-tagger

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/jiangyun-fun/cs-tagger/archive/refs/tags/v${{ version }}.tar.gz
  sha256: bd3b3753e21d7077f2cfe118bbd9dde142cbf1611f26bebd65edbd516c5d4586

build:
  number: 0
  skip: win

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cmake
    - make
    - pkg-config
    - clang
    - libclang
  host:
    - zlib
    - bzip2
    - liblzma-devel
    - openssl
    - libcurl

tests:
  - script:
      - cs-tagger --help
      - cs-tagger --version

about:
  homepage: https://github.com/jiangyun-fun/cs-tagger
  summary: Generate minimap2-like CS tags for BAM files
  description: |
    CS tags encode the alignment between query and reference sequences in a
    compact string representation. This tool computes CS tags from an existing
    BAM alignment and a reference FASTA, then writes them as auxiliary tags
    into the output BAM.
  license: MIT
  license_file:
    - LICENSE
    - cs-tagger/THIRDPARTY.yml
  repository: https://github.com/jiangyun-fun/cs-tagger

extra:
  recipe-maintainers:
    - jiangyun-fun
