context:
  version: "0.2.1"
  name: cs-tag

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/jiangyun-fun/cs-tag/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 700049af14118ca258d5013c4ecdd1d64ca6caa7066b943ebfc47e131d5bb63d

build:
  number: 0
  skip: win

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cmake
    - make
    - pkg-config
    - clang
    - libclang
  host:
    - zlib
    - bzip2
    - liblzma-devel
    - openssl
    - libcurl

tests:
  - script:
      - cs-tag --help
      - cs-tag --version

about:
  homepage: https://github.com/jiangyun-fun/cs-tag
  summary: Generate minimap2-like CS tags for BAM files
  description: |
    CS tags encode the alignment between query and reference sequences in a
    compact string representation. This tool computes CS tags from an existing
    BAM alignment and a reference FASTA, then writes them as auxiliary tags
    into the output BAM.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  repository: https://github.com/jiangyun-fun/cs-tag

extra:
  recipe-maintainers:
    - jiangyun-fun
